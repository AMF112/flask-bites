{% extends 'base.html' %}
{% block title %} {{ title }} {% endblock %}

{% block content %}
<div class="menu py-5">
    <div class="container">
        <div class="row g-4 justify-content-center">
            {% for item in items %}
            <div class="col-12 col-sm-6 col-lg-4">
                <div class="card h-100 border-0 shadow-lg overflow-hidden">
                    <div class="position-relative">
                        <img class="card-img-top menu-img" src="{{ url_for('static', filename='assets/images/menu/' + item.img_url) }}" alt="{{ item.name }}">
                        <div class="position-absolute top-0 end-0 m-3">
                            <span class="badge bg-dark bg-opacity-75 rounded-pill px-3 py-2 border border-secondary border-opacity-50">
                                ₱{{ item.price }}
                            </span>
                        </div>
                    </div>

                    <div class="card-body d-flex flex-column p-4">
                        <h5 class="card-title fw-bold mb-2"> {{ item.name }} </h5>
                        <p class="card-text text-secondary small flex-grow-1">
                            {{ item.description }}
                        </p>

                        <div class="mt-4">
                            {% if current_user.is_authenticated %}
                            <a href="{{ url_for('add_item', menu_id=item.id) }}"
                               class="btn btn-orange w-100 py-2 rounded-pill fw-semibold">
                                Add to Bag
                            </a>
                            {% else %}
                            <span class="d-inline-block w-100"
                                  tabindex="0"
                                  data-bs-toggle="tooltip"
                                  data-bs-placement="top"
                                  title="Log in to start ordering">
                                <button class="btn btn-orange w-100 py-2 rounded-pill fw-semibold disabled"
                                        type="button" disabled>
                                    Add to Bag
                                </button>
                            </span>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
